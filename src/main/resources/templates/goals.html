<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Goals</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="container">
  <div class="nav">
    <a th:href="@{/dashboard}">Dashboard</a>
    <a th:href="@{/goals}">Goals</a>
  </div>

  <h1>🎯 Nutrition Goals</h1>

  <p class="message" th:if="${msg}" th:text="${msg}"></p>

  <div class="card">
    <form th:action="@{/goals}" method="post">

      <div class="input-group">
        <label>Goal Type</label>
        <select name="goalType">
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
        </select>
      </div>

      <div class="input-group">
        <label>Calories</label>
        <input type="number" step="0.1" name="calorieGoal" th:value="${calorieGoal}" required>
      </div>

      <div class="input-group">
        <label>Protein (g)</label>
        <input type="number" step="0.1" name="proteinGoal" th:value="${proteinGoal}" required>
      </div>

      <div class="input-group">
        <label>Sugar (g)</label>
        <input type="number" step="0.1" name="sugarGoal" th:value="${sugarGoal}" required>
      </div>

      <div class="input-group">
        <label>Carbs (g)</label>
        <input type="number" step="0.1" name="carbGoal">
      </div>

      <button type="submit" class="btn">Save Goals</button>
    </form>
  </div>

  <div class="card">
    <h3>Current Goals</h3>
    <p>Calories Goal: <span th:text="${calorieGoal}"></span></p>
    <p>Protein Goal: <span th:text="${proteinGoal}"></span></p>
    <p>Sugar Goal: <span th:text="${sugarGoal}"></span></p>
  </div>

  <div class="card">
    <h3>Weekly Goals (Coming Soon)</h3>
    <p>Track your weekly nutrient intake and compare against goals.</p>
  </div>

  <a class="back-link" th:href="@{/dashboard}">← Back to Dashboard</a>
</div>

</body>
</html>

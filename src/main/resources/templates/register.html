<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>Nutrintake - Register</title>
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>

<main class="register-page">

    <header class="hero">
        <h1 class="logo">Nutrintake</h1>
        <p class="tagline">Track. Nourish. Thrive.</p>
    </header>

    <section class="register-card">
        <h2>Create Account</h2>

        <p th:if="${msg}" th:text="${msg}" class="flash"></p>

        <form th:action="@{/register}" method="post" class="form">
            <label>Email
                <input type="email" name="email" required placeholder="your email" />
            </label>

            <label>Password
                <input type="password" name="password" required minlength="4" placeholder="Create a password" />
            </label>

            <label>Confirm Password
                <input type="password" name="confirmPassword" required minlength="4" placeholder="Confirm password" />
            </label>

            <button type="submit">Sign Up</button>
        </form>

        <p class="muted">
            Already have an account?
            <a th:href="@{/login}">Login</a>
        </p>
    </section>

</main>

</body>
</html>

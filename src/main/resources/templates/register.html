<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>NutriTrack - Register</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<main class="container">
    <section class="card" style="max-width: 420px; margin: 60px auto;">
        <h2>Create Account</h2>

        <p th:if="${msg}" th:text="${msg}" class="flash"></p>

        <form th:action="@{/register}" method="post" class="small-form">
            <label>Email
                <input type="email" name="email" required placeholder="your email" />
            </label>

            <label>Password
                <input type="password" name="password" required minlength="4" placeholder="Create a password" />
            </label>

            <label>Confirm Password
                <input type="password" name="confirmPassword" required minlength="4" placeholder="Confirm password" />
            </label>

            <div class="form-actions">
                <button type="submit">Sign Up</button>
            </div>
        </form>

        <p class="muted" style="margin-top: 12px;">
            Already have an account?
            <a th:href="@{/login}">Login</a>
        </p>
    </section>
</main>
</body>
</html>

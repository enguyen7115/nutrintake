<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>Nutrintake - Dashboard</title>
    <!-- Link to shared stylesheet -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- Reusable navigation header fragment -->
<div th:replace="fragments/header :: header"></div>

<main class="container">

    <!-- Flash message (success or error message after submission) -->
    <div class="flash" th:if="${msg}" th:text="${msg}"></div>

    <!-- Daily totals section -->
    <section class="card totals">
        <h2>Today's Totals — <span th:text="${viewDate}">2026-02-21</span></h2>

        <!-- Nutrient totals dynamically populated from controller -->
        <div class="totals-grid">
            <div class="stat">
                <div class="label">Calories</div>
                <div class="value" th:text="${calories}">0</div>
            </div>
            <div class="stat">
                <div class="label">Protein (g)</div>
                <div class="value" th:text="${protein}">0</div>
            </div>
            <div class="stat">
                <div class="label">Sugar (g)</div>
                <div class="value" th:text="${sugar}">0</div>
            </div>
        </div>
    </section>
    <div class="card goals-summary">
        <h3>Goals Progress</h3>

        <div class="chart-row">
            <div class="chart-box">
                <h4>Calories</h4>
                <canvas id="calorieChart"></canvas>
                <p>
                    <span th:text="${calories}"></span> /
                    <span th:text="${calorieGoal}"></span>
                </p>

                <p class="status"
                   th:text="${calories > calorieGoal} ? 'Over goal' : 'On track'">
                </p>
            </div>

            <div class="chart-box">
                <h4>Protein</h4>
                <canvas id="proteinChart"></canvas>
                <p>
                    <span th:text="${protein}"></span> /
                    <span th:text="${proteinGoal}"></span>
                </p>
            </div>

            <div class="chart-box">
                <h4>Sugar</h4>
                <canvas id="sugarChart"></canvas>
                <p>
                    <span th:text="${sugar}"></span> /
                    <span th:text="${sugarGoal}"></span>
                </p>
            </div>
        </div>

        <a class="back-link" th:href="@{/goals}">Edit Goals</a>
    </div>

    <!-- Main dashboard interaction area -->
    <section class="card input-and-list">

        <!-- Food creation section -->
        <section class="card">
            <h2>Create Food</h2>

            <!-- Food name input -->
            <form th:action="@{/foods}" method="post" class="small-form">
                <label>Name
                    <input name="name" required placeholder="e.g., Oatmeal"/>
                </label>

                <!-- Nutrient inputs per serving -->
                <label>Calories (per serving)
                    <input name="calories" type="number" step="0.1" min="0" required/>
                </label>

                <label>Protein (g per serving)
                    <input name="protein" type="number" step="0.1" min="0" required/>
                </label>

                <label>Sugar (g per serving)
                    <input name="sugar" type="number" step="0.1" min="0" required/>
                </label>

                <!-- Date input (defaults to selected date) -->
                <label>Date
                    <input name="date" type="date" th:value="${viewDate}" />
                </label>

                <div class="form-actions">
                    <button type="submit">Create</button>
                </div>
            </form>

            <!-- Date input (defaults to selected date) -->
            <h3>Saved Foods</h3>
            <table class="table">
                <thead>
                <tr><th>Name</th><th>Calories</th><th>Protein</th><th>Sugar</th></tr>
                </thead>
                <tbody>

                <!-- Loop through foods list -->
                <tr th:each="f : ${foods}">
                    <td th:text="${f.name}">Food</td>
                    <td th:text="${f.calories}">0</td>
                    <td th:text="${f.protein}">0</td>
                    <td th:text="${f.sugar}">0</td>
                </tr>
                </tbody>
            </table>
        </section>

        <!-- Loop through foods list -->
        <div class="left">
            <h3>Add Food (placeholder)</h3>
            <form th:action="@{/logs}" method="post" class="small-form">
                <label>Food
                    <select name="foodName">
                        <option th:each="f : ${foods}" th:value="${f.name}" th:text="${f.name}">Food</option>
                    </select>
                </label>
                <label>Servings
                    <input name="servings" type="number" step="1" value="1" />
                </label>
                <div class="form-actions">
                    <button type="submit">Save</button>
                </div>
            </form>
        </div>

        <div class="right">
            <h3>What I’ve Eaten (Today)</h3>

            <table class="table">
                <thead><tr><th>Food</th><th>Servings</th><th>Calories</th></tr></thead>
                <tbody>
                <tr th:each="log : ${logs}">
                    <td th:text="${log.foodName}">Oatmeal</td>
                    <td th:text="${log.servings}">1</td>
                    <td th:text="${log.calories}">300</td>
                </tr>
                </tbody>
            </table>

        </div>
    </section>
</main>
<script th:inline="javascript">
    const calories = [[${calories}]];
    const calorieGoal = [[${calorieGoal}]];
    const protein = [[${protein}]];
    const proteinGoal = [[${proteinGoal}]];
    const sugar = [[${sugar}]];
    const sugarGoal = [[${sugarGoal}]];

    function makeDonutChart(canvasId, value, goal) {
        let data;
        let colors;

        if (value <= goal) {
            // Normal case
            data = [value, goal - value];
            colors = ['#4CAF50', '#ddd']; // green + gray
        } else {
            // Over goal
            data = [goal, value - goal];
            colors = ['#4CAF50', '#2196F3']; // green + BLUE
        }

        new Chart(document.getElementById(canvasId), {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: data,
                    backgroundColor: colors
                }]
            },
            options: {
                responsive: true,
                cutout: '70%',
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });
    }

    makeDonutChart('calorieChart', calories, calorieGoal);
    makeDonutChart('proteinChart', protein, proteinGoal);
    makeDonutChart('sugarChart', sugar, sugarGoal);
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>NutriTrack - Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<!--div th:replace="fragments/header :: header"></div>-->

<main class="container">
    <section class="card totals">
        <h2>Today's Totals — <span th:text="${viewDate}">2026-02-21</span></h2>
        <div class="totals-grid">
            <div class="stat">
                <div class="label">Calories</div>
                <div class="value" th:text="${calories}">0</div>
            </div>
            <div class="stat">
                <div class="label">Protein (g)</div>
                <div class="value" th:text="${protein}">0</div>
            </div>
            <div class="stat">
                <div class="label">Sugar (g)</div>
                <div class="value" th:text="${sugar}">0</div>
            </div>
        </div>
    </section>

    <section class="card input-and-list">
        <div class="left">
            <h3>Add Food (placeholder)</h3>
            <form th:action="@{/logs}" method="post" class="small-form">
                <label>Food
                    <select name="foodName">
                        <option th:each="f : ${foods}" th:value="${f}" th:text="${f}">Food</option>
                    </select>
                </label>
                <label>Servings
                    <input name="servings" type="number" step="0.1" value="1" />
                </label>
                <label>Calories
                    <input name="calories" type="number" step="0.1" />
                </label>
                <div class="form-actions">
                    <button type="submit">Save</button>
                </div>
            </form>
        </div>

        <div class="right">
            <h3>What I’ve Eaten (Today)</h3>

            <table class="table">
                <thead><tr><th>Food</th><th>Servings</th><th>Calories</th></tr></thead>
                <tbody>
                <tr th:each="log : ${logs}">
                    <td th:text="${log.foodName}">Oatmeal</td>
                    <td th:text="${log.servings}">1</td>
                    <td th:text="${log.calories}">300</td>
                </tr>
                </tbody>
            </table>

        </div>
    </section>
</main>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>Nutrintake - Login</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<main class="container">
    <section class="card" style="max-width: 420px; margin: 60px auto;">
        <h2>Login</h2>

        <!-- optional message (errors, success) -->
        <p th:if="${msg}" th:text="${msg}" class="flash"></p>

        <form th:action="@{/login}" method="post" class="small-form">
            <label>Email
                <input type="email" name="email" required placeholder="Your Email" />
            </label>

            <label>Password
                <input type="password" name="password" required placeholder="••••••••" />
            </label>

            <div class="form-actions">
                <button type="submit">Login</button>
            </div>
        </form>

        <p class="muted" style="margin-top: 12px;">
            Don’t have an account?
            <a th:href="@{/register}">Register</a>
        </p>
    </section>
</main>
</body>
</html>
